<h1>正論について</h1>
正論は時に悪いものになり得るとされる。しかし、正論に間違いはない。例えば、太っている人にデブと言うことは正論であろうか。そのことを考えるためには話者の意図を考える必要がある。話者が相手を傷つけようとして相手をデブと言ったのならば、それは人を傷つけてはいけないという倫理に反するから、正論ではない。太っている人に、例えば、低熱量で美味しい食べ物を勧めるということは倫理的であり正論であると言えるであろう。<br>
