<h1>空のある論理学</h1>
空のある論理学について語る。空とは有か無か決まっていないということである。空のある論理学は3値論理ではない。空は有も無も代入していないということである。プログラミング言語の例がわかりやすいだろう。そこでは空とは確保されていないメモリのことである。仏教ではそのようなことから鑑みて空とは全てのメモリのことを指すのだろう。古典論理はある種の理想主義であり空を否定していないと私は考える。古典論理におけるAとは空であると私は予見している。<br>
