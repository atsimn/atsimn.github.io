<h1>倫理の本質は無駄のないことである</h1>
ここで「無駄」という言葉について考えてみたい。「駄」というのは「余計なもの」というようなことだろうから、「駄」という言葉で「無駄」ということをほとんど表現している。それでは、「無駄」の「無」は何か。私はそれは未来のことを表していると思う。未来的意義である。このようなことは言語ではよくあると思う。例えば「阿呆」という言葉には、阿呆でなくなりますようにというな念が示されていると私は感じる。「無駄」の「無」もそのような念であると思う。<br>
